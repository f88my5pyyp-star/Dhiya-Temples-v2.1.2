<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dhiya Temples</title>

  <!-- iOS Home Screen App Icon & Web App Meta Tags -->
  <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dhiya Temples">

  <!-- PDF & Excel Export Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg: #0b0f19;
      --card: #151c2e;
      --text: #ffffff;
      --subtext: #94a3b8;
      --border: rgba(255, 255, 255, 0.12);
      --input-bg: #0a0e17;
      --nav-bg: rgba(15, 28, 46, 0.9);
      
      /* Dynamic Vibrant Tab Gradients */
      --theme-dash: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
      --theme-proj: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
      --theme-exp: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
      --theme-set: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      
      --active-theme: var(--theme-dash);
      --active-glow: rgba(139, 92, 246, 0.4);
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --subtext: #64748b;
      --border: rgba(0, 0, 0, 0.1);
      --input-bg: #f8fafc;
      --nav-bg: rgba(255, 255, 255, 0.9);
      --active-glow: rgba(99, 102, 241, 0.25);
    }

    /* PER-TAB THEME OVERRIDES */
    body[data-tab="dashboard"] { --active-theme: var(--theme-dash); --active-glow: rgba(217, 70, 239, 0.35); }
    body[data-tab="projects"]  { --active-theme: var(--theme-proj); --active-glow: rgba(16, 185, 129, 0.35); }
    body[data-tab="expenses"]  { --active-theme: var(--theme-exp);  --active-glow: rgba(244, 63, 94, 0.35); }
    body[data-tab="settings"]  { --active-theme: var(--theme-set);  --active-glow: rgba(59, 130, 246, 0.35); }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 650px; margin: 0 auto; padding: 16px 16px 110px 16px;
      box-sizing: border-box; transition: background 0.4s ease, color 0.4s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* HEADER */
    .app-header {
      text-align: center; margin-bottom: 20px; padding: 18px;
      background: var(--card); border-radius: 24px; border: 2px solid transparent;
      background-image: linear-gradient(var(--card), var(--card)), var(--active-theme);
      background-origin: border-box; background-clip: padding-box, border-box;
      box-shadow: 0 10px 30px var(--active-glow); transition: all 0.4s ease;
    }
    .dashboard-logo { max-width: 180px; height: auto; display: block; margin: 0 auto 8px auto; filter: drop-shadow(0 4px 12px var(--active-glow)); }

    /* CARDS & CONTAINERS */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    h1 {
      font-size: 1.6rem; margin: 0 0 18px; background: var(--active-theme);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 8px; font-weight: 900; letter-spacing: -0.5px;
    }
    h3 { margin: 0 0 14px; font-size: 1.1rem; color: var(--text); font-weight: 800; }

    form { display: flex; flex-direction: column; gap: 12px; }
    input, select, button {
      padding: 14px; border-radius: 14px; border: 2px solid var(--border);
      font-size: 0.95rem; background: var(--input-bg); color: var(--text);
      box-sizing: border-box; width: 100%; outline: none; font-weight: 700; transition: all 0.2s ease;
    }
    input:focus, select:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.25); }

    .btn {
      background: var(--active-theme); color: #ffffff; border: none; font-weight: 900;
      cursor: pointer; border-radius: 14px; box-shadow: 0 6px 20px var(--active-glow);
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }
    .btn:active { transform: scale(0.94); }
    .btn-danger { background: linear-gradient(135deg, #ff0055 0%, #ff5050 100%); box-shadow: 0 6px 18px rgba(255, 0, 85, 0.4); color: white; border: none; }
    .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4); color: white; border: none; }
    .btn-small { padding: 8px 14px; font-size: 0.85rem; width: auto; border-radius: 10px; }
    .btn-group { display: flex; gap: 8px; }

    .navbar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 650px; background: var(--nav-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border); display: flex; justify-content: space-around;
      padding: 12px 0 24px 0; z-index: 1000;
    }
    .nav-btn {
      background: none; border: none; color: var(--subtext); font-size: 0.78rem;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; flex: 1; font-weight: 800; transition: transform 0.2s ease, color 0.2s ease;
    }
    .nav-btn.active { color: #ffffff; transform: translateY(-3px); }
    .nav-icon { font-size: 1.4rem; transition: transform 0.2s ease; }
    .nav-btn.active .nav-icon { transform: scale(1.3); filter: drop-shadow(0 0 10px var(--active-glow)); }

    .page { display: none; }
    .page.active { display: block; animation: pageSlideIn 0.3s ease-out; }

    #page-dashboard.active { background: radial-gradient(circle at top, rgba(217, 70, 239, 0.08), transparent 70%); }
    #page-projects.active  { background: radial-gradient(circle at top, rgba(16, 185, 129, 0.08), transparent 70%); }
    #page-expenses.active  { background: radial-gradient(circle at top, rgba(244, 63, 94, 0.08), transparent 70%); }
    #page-settings.active  { background: radial-gradient(circle at top, rgba(59, 130, 246, 0.08), transparent 70%); }

    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .metric-card { text-align: center; padding: 18px; border: 1.5px solid var(--border); }
    .metric-val { font-size: 1.5rem; font-weight: 900; margin-top: 6px; }
    .progress-bar-bg { background: var(--input-bg); height: 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); padding: 2px; }
    .progress-bar-fill { background: var(--theme-dash); height: 100%; width: 0%; border-radius: 8px; transition: width 0.6s ease; box-shadow: 0 0 12px rgba(217, 70, 239, 0.6); }

    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .item-row:last-child { border-bottom: none; }
    
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 900; text-transform: uppercase; color: #000; }
    .badge-in-progress { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); box-shadow: 0 0 10px rgba(0,242,254,0.4); }
    .badge-completed   { background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%); box-shadow: 0 0 10px rgba(0,245,160,0.4); }
    .badge-planning    { background: linear-gradient(135deg, #ffb300 0%, #f77737 100%); box-shadow: 0 0 10px rgba(255,179,0,0.4); }
    .cat-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.1); color: var(--text); font-weight: 800; border: 1px solid var(--border); }
    .item-link { display: inline-block; font-size: 0.8rem; color: #38bdf8; font-weight: 800; text-decoration: underline; margin-top: 4px; cursor: pointer; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px;
    }
    .modal-card {
      background: var(--card); border-radius: 24px; max-width: 500px; width: 100%;
      padding: 24px; text-align: center; border: 2px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: popIn 0.3s ease-out;
    }
    .modal-img { max-width: 100%; height: auto; border-radius: 16px; margin-top: 12px; border: 1px solid var(--border); }

    @keyframes pageSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    #pdf-wrapper { display: none; }
    .pdf-page { width: 680px; padding: 35px; background: #ffffff; color: #0f172a; font-family: Arial, sans-serif; position: relative; box-sizing: border-box; }
    .pdf-watermark-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; opacity: 0.08; }
    .pdf-watermark-overlay img { width: 80%; }
    .pdf-content { position: relative; z-index: 2; }
    .pdf-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .pdf-table th, .pdf-table td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-size: 0.85rem; }
    .pdf-table th { background: #f8fafc; font-weight: bold; }
  </style>
</head>
